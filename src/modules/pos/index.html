<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Terminal | KETICK Elite</title>
    <link rel="stylesheet" href="../../../assets/css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            background: #0a0a0a;
            color: white;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Layout Utama */
        .pos-wrapper {
            display: grid;
            grid-template-columns: 1fr 350px;
            flex: 1;
            overflow: hidden;
        }

        /* Bahagian Produk (Kiri) */
        .product-section {
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .product-card:hover {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
        }

        .product-price { color: #D4AF37; font-weight: 600; margin-top: 5px; }

        /* Bahagian Cart (Kanan) */
        .cart-section {
            background: #111;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-top: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.9rem;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .cart-total {
            border-top: 2px solid #D4AF37;
            padding-top: 20px;
            margin-top: 10px;
        }

        .btn-checkout {
            width: 100%;
            padding: 20px;
            background: #D4AF37;
            color: black;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-checkout:hover {
            background: #f1c40f;
            transform: translateY(-2px);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .pos-wrapper { grid-template-columns: 1fr; }
            .cart-section { height: 350px; border-top: 1px solid #333; }
        }
    </style>
</head>
<body class="level-operator">

    <header style="padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center;">
        <a href="../../../index.html" style="color:#666; text-decoration:none; font-size: 0.8rem; font-weight: 600;">← BACK</a>
        <div style="color:#D4AF37; font-weight:bold; letter-spacing:2px; font-size: 1.2rem;">POS TERMINAL</div>
        <div id="pos-clock" style="font-size:0.8rem; color:#888; font-family: monospace;">00:00:00</div>
    </header>

    <div class="pos-wrapper">
        <div class="product-section">
            <input type="text" placeholder="Cari barang atau scan barcode..." 
                   style="width:100%; padding:15px; margin-bottom:20px; border-radius:10px; border:1px solid #333; background:#1a1a1a; color:white; outline: none; box-sizing: border-box;">
            
            <div class="product-grid" id="productGrid">
                </div>
        </div>

        <div class="cart-section">
            <h3 style="margin:0; font-family: 'Playfair Display';">Current Order</h3>
            <div class="cart-items" id="cartList">
                <p style="color:#444; text-align:center; margin-top:50px;">Bakul kosong</p>
            </div>

            <div class="cart-total">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px; color: #888;">
                    <span>Subtotal</span>
                    <span id="subtotal">RM 0.00</span>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:1.5rem; font-weight:bold; color: #D4AF37;">
                    <span>Total</span>
                    <span id="grandTotal">RM 0.00</span>
                </div>
                <button class="btn-checkout" onclick="checkout()">PAYMENT (F10)</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Premium Server", price: 2500.00 },
            { id: 2, name: "Fiber Cable 10m", price: 120.00 },
            { id: 3, name: "Elite Workstation", price: 4500.00 },
            { id: 4, name: "Router Pro X", price: 890.00 },
            { id: 5, name: "Cloud License", price: 350.00 }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="addToCart(${p.id})">
                    <div style="font-size:0.8rem; font-weight:600;">${p.name}</div>
                    <div class="product-price">RM ${p.price.toFixed(2)}</div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            cart.push({...p, timestamp: Date.now()});
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartList');
            const sub = document.getElementById('subtotal');
            const grand = document.getElementById('grandTotal');

            if(cart.length === 0) {
                list.innerHTML = `<p style="color:#444; text-align:center; margin-top:50px;">Bakul kosong</p>`;
                sub.innerText = "RM 0.00";
                grand.innerText = "RM 0.00";
                return;
            }

            list.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>RM ${item.price.toFixed(2)}</span>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            sub.innerText = `RM ${total.toFixed(2)}`;
            grand.innerText = `RM ${total.toFixed(2)}`;
        }

        // FUNGSI CHECKOUT DENGAN INTEGRASI RESIT
        function checkout() {
            if(cart.length === 0) return alert("Bakul kosong!");

            // 1. Simpan data ke LocalStorage untuk dibaca oleh receipt_template.html
            const receiptData = {
                items: cart,
                total: cart.reduce((sum, item) => sum + item.price, 0),
                time: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString('ms-MY')
            };
            localStorage.setItem('last_receipt', JSON.stringify(receiptData));

            // 2. Makluman kepada user
            alert("Transaksi Berjaya! Stok telah dikurangkan secara maya.");

            // 3. Buka tetingkap resit secara automatik
            const receiptWindow = window.open('receipt_template.html', '_blank', 'width=400,height=600');
            
            // 4. Kosongkan bakul selepas selesai
            cart = [];
            updateCart();
        }

        // Clock logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('pos-clock').innerText = now.toLocaleTimeString();
        }, 1000);

        renderProducts();
    </script>
</body>
</html>
