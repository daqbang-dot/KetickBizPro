<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Elite | Command Center</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Style tambahan khusus untuk Dashboard utama */
        :root {
            --obsidian: #0A0A0A;
            --gold: #D4AF37;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .command-header {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        .status-pulse {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #888;
        }

        .module-grid {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card DNA */
        .module-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: block;
        }

        .module-card:hover:not(.locked) {
            border-color: var(--gold);
            transform: translateY(-5px);
            background: rgba(212, 175, 55, 0.05);
        }

        .module-card h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .module-card p {
            font-size: 0.85rem;
            color: #aaa;
            margin-top: 0.5rem;
        }

        .indicator {
            height: 2px;
            width: 30px;
            background: var(--gold);
            margin-top: 1rem;
        }

        .locked {
            opacity: 0.4;
            filter: grayscale(1);
            cursor: not-allowed;
            border-style: dashed;
        }

        .lock-icon {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body class="level-ceo">

    <header class="command-header">
        <div class="status-pulse" id="access-label">Sovereign Control Active</div>
        <h1 id="header-title">THE PULSE</h1>
        <div id="live-profit" style="font-size: 3rem; font-weight: 300; margin-top: 10px;">
            RM 0.00
        </div>
    </header>

    <main class="module-grid" id="main-grid">
        </main>

    <script type="module">
        // Import logic (dalam production gunakan path sebenar)
        // Simulasi data dari src/core/access_control.js
        const systemConfig = {
            subscriptions: {
                executive: true,   // Modul Architect
                operator: true,    // Modul Specialist
                inventory: true,   // Modul Inventory
                sales: false       // Add-on Belum Beli
            },
            permissions: {
                ceo: ["executive", "operator", "inventory", "sales"],
                executive: ["executive", "inventory"],
                operator: ["operator"]
            }
        };

        const modules = [
            { id: 'executive', title: 'The Architect', desc: 'Executive analytics & performance.' },
            { id: 'operator', title: 'The Specialist', desc: 'Operational workflow & tasking.' },
            { id: 'inventory', title: 'Global Inventory', desc: 'Asset & luxury resource tracking.' },
            { id: 'sales', title: 'Revenue Hub', desc: 'Deep-dive into transaction flow.' }
        ];

        // TUKAR USER DI SINI UNTUK TESTING (ceo / executive / operator)
        const currentUserLevel = 'ceo'; 

        function renderDashboard() {
            const grid = document.getElementById('main-grid');
            const accessLabel = document.getElementById('access-label');
            grid.innerHTML = '';

            // Update Label Header
            accessLabel.innerText = `${currentUserLevel.toUpperCase()} Access Active`;

            modules.forEach(mod => {
                const isSubscribed = systemConfig.subscriptions[mod.id];
                const hasPermission = systemConfig.permissions[currentUserLevel].includes(mod.id);

                if (isSubscribed && hasPermission) {
                    // Tunjuk Kad Aktif
                    grid.innerHTML += `
                        <a href="src/modules/${mod.id}/index.html" class="module-card">
                            <h3>${mod.title}</h3>
                            <p>${mod.desc}</p>
                            <div class="indicator"></div>
                        </a>`;
                } else if (!isSubscribed && currentUserLevel === 'ceo') {
                    // Jika CEO dan modul belum dibeli (SaaS Upsell)
                    grid.innerHTML += `
                        <div class="module-card locked">
                            <h3>${mod.title}</h3>
                            <p>Premium Add-on</p>
                            <div class="lock-icon">🔒 Unlock for Elite Access</div>
                        </div>`;
                }
                // Jika Operator/Exec tak ada permission, modul terus disorok (Suku/Separuh akses)
            });
        }

        // Logic Pulse Profit
        let profit = 125480.50;
        const profitElement = document.getElementById('live-profit');
        
        function updatePulse() {
            profit += (Math.random() * 10);
            profitElement.innerText = 'RM ' + profit.toLocaleString(undefined, {minimumFractionDigits: 2});
        }
        
        setInterval(updatePulse, 3000);
        updatePulse();
        renderDashboard();
    </script>
</body>
</html>
