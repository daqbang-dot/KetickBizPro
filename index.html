<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem ERP | Dashboard Utama</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="menu-overlay" class="overlay"></div>

    <nav id="menu-drawer" class="drawer">
        <div class="drawer-header">
            <h2>KetickHub ERP</h2>
            <button id="close-drawer-btn" class="icon-btn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="active"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="#"><i class="fas fa-cash-register"></i> POS</a></li>
            <li><a href="#"><i class="fas fa-boxes"></i> Inventory</a></li>
            <li><a href="#"><i class="fas fa-users"></i> CRM</a></li>
            <li><a href="#"><i class="fas fa-file-invoice-dollar"></i> Billing</a></li>
            <li><a href="#"><i class="fab fa-whatsapp"></i> WA Blast</a></li>
            <li><a href="#"><i class="fab fa-instagram"></i> Social Media</a></li>
            <li><a href="#"><i class="fas fa-landmark"></i> LHDN</a></li>
            <li><a href="#"><i class="fas fa-ticket-alt"></i> Kupon</a></li>
            <li><a href="#"><i class="fas fa-chart-bar"></i> Report</a></li>
            <li><a href="#"><i class="fas fa-history"></i> History</a></li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <div class="header-left">
                <button id="open-drawer-btn" class="icon-btn"><i class="fas fa-bars"></i></button>
                <h1>Dashboard Utama</h1>
            </div>
            <div class="user-profile">
                <span>Admin</span>
            </div>
        </header>

        <section class="dashboard-cards">
            <div class="card">
                <h3>Jualan Hari Ini</h3>
                <p>RM 0.00</p>
            </div>
            <div class="card">
                <h3>Stok Rendah</h3>
                <p>0 Item</p>
            </div>
            <div class="card">
                <h3>Invois Tertunggak</h3>
                <p>0</p>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
