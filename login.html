<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Elite | The Gatekeeper</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            overflow: hidden; font-family: 'Inter', sans-serif;
        }
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            border-radius: 50%; top: -10%; right: -10%; z-index: 0;
            animation: pulse 10s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.2); opacity: 0.8; } }
        .login-card {
            position: relative; z-index: 1; width: 100%; max-width: 400px;
            padding: 50px; background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px); border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); text-align: center;
        }
        .brand-logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #D4AF37; margin-bottom: 10px; letter-spacing: 5px; }
        .brand-tagline { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: #666; margin-bottom: 40px; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; margin-bottom: 8px; padding-left: 5px; }
        input { width: 100%; padding: 15px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; font-size: 0.9rem; outline: none; transition: all 0.3s ease; box-sizing: border-box; }
        input:focus { border-color: #D4AF37; background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .btn-login { width: 100%; padding: 18px; background: #D4AF37; color: #000; border: none; border-radius: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        .btn-login:hover { background: #f1c40f; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .login-footer { margin-top: 30px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="login-card">
        <div class="brand-logo">KETICK</div>
        <div class="brand-tagline">Elite Business Intelligence</div>
        <form id="loginForm">
            <div class="input-group">
                <label>Identify Access Level</label>
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <label>Secure Key</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Authorize Access</button>
        </form>
        <div class="login-footer">&copy; 2026 AZLANMYMO & KETICK.</div>
    </div>

    <script type="module">
        import { userRegistry } from './src/core/user_registry.js';

        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const userInput = document.getElementById('username').value.toLowerCase();
            const passInput = document.getElementById('password').value;

            // Semak kredential dari registry
            const validUser = userRegistry.find(u => u.username === userInput && u.password === passInput);

            if (validUser) {
                localStorage.setItem('ketick_user_level', validUser.role);
                localStorage.setItem('ketick_user_name', validUser.name);
                
                const btn = document.querySelector('.btn-login');
                btn.innerText = "AUTHENTICATING...";
                btn.style.opacity = "0.7";

                setTimeout(() => { window.location.href = 'index.html'; }, 1200);
            } else {
                alert('ACCESS DENIED: Username atau Password salah!');
            }
        });
    </script>
</body>
</html>
