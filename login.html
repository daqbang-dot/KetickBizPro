<script type="module">
    // --- 1. SECURITY GUARD (SEMAK SESI) ---
    // Ambil data user yang disimpan masa login tadi
    const session = localStorage.getItem('ketick_user_level');

    // Jika tiada data dalam memori (tak login lagi), tendang ke login.html
    if (!session) {
        window.location.href = 'login.html';
    }
    // --------------------------------------

    // --- 2. JALANKAN DASHBOARD ---
    import { masterConfig, applyTheme } from './src/core/master_config.js';
    
    // currentUser sekarang dinamik ikut siapa yang login
    const currentUser = session; 

    function initDashboard() {
        // Panggil fungsi applyTheme untuk tukar warna emas/putih secara automatik
        applyTheme();
        
        // Logik bina dashboard anda yang seterusnya...
        console.log("Welcome, " + currentUser.toUpperCase());
    }

    initDashboard();
</script>
